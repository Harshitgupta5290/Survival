name: CI — Lint & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate GDScript & Export Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check export_presets.cfg exists
        run: |
          if [ ! -f godot_project/export_presets.cfg ]; then
            echo "ERROR: export_presets.cfg not found. Add Web and Android presets in Godot editor first."
            exit 1
          fi

      - name: Check required assets exist
        run: |
          REQUIRED=(
            "godot_project/project.godot"
            "godot_project/scenes/main_menu.tscn"
            "godot_project/scenes/game.tscn"
            "godot_project/scenes/player.tscn"
            "godot_project/assets/levels/level1_data.csv"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
          done
          echo "All required files present."

  build-web:
    name: Build HTML5 (Web)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot 4.2
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2-stable_linux.x86_64.zip
          sudo mv Godot_v4.2-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.2.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_export_templates.tpz
          unzip -q Godot_v4.2-stable_export_templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.2.stable/

      - name: Export HTML5
        run: |
          mkdir -p build/web
          cd godot_project
          godot --headless --export-release "Web" ../build/web/index.html 2>&1
          echo "Build output:"
          ls -la ../build/web/

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 14
